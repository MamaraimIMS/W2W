<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отели Узбекистана 2026 — Прайс-лист</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8A96E;
    --gold-light: #E8D5A8;
    --dark: #0F0E0C;
    --dark2: #1A1814;
    --dark3: #242018;
    --dark4: #2E2920;
    --cream: #F5EDD8;
    --cream2: #EDE3CA;
    --text: #D4C89A;
    --text2: #8C7D5E;
    --accent-tashkent: #C8A96E;
    --accent-samarkand: #7BA7B8;
    --accent-bukhara: #B8826A;
    --accent-khiva: #8BA870;
    --season1: #4A7C59;
    --season2: #B8914A;
    --season3: #6A8BAD;
    --season4: #9B6BAD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--dark2) 0%, #1E1B12 50%, var(--dark2) 100%);
    border-bottom: 1px solid rgba(200,169,110,0.25);
    padding: 28px 40px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .header-left span {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-top: 2px;
  }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .stat-pill {
    text-align: center;
  }

  .stat-pill .num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    display: block;
  }

  .stat-pill .lbl {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ── FILTERS BAR ── */
  .filters-bar {
    background: var(--dark2);
    border-bottom: 1px solid rgba(200,169,110,0.1);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text2);
    white-space: nowrap;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 2px;
    border: 1px solid rgba(200,169,110,0.25);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 600; }

  .filter-sep { width: 1px; height: 24px; background: rgba(200,169,110,0.15); margin: 0 4px; }

  .search-input {
    padding: 6px 14px;
    border: 1px solid rgba(200,169,110,0.25);
    background: rgba(255,255,255,0.03);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    border-radius: 2px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
    margin-left: auto;
  }

  .search-input::placeholder { color: var(--text2); }
  .search-input:focus { border-color: var(--gold); }

  /* ── LEGEND ── */
  .legend-bar {
    background: var(--dark3);
    padding: 10px 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(200,169,110,0.08);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text2);
  }

  .legend-dot {
    width: 10px; height: 10px; border-radius: 1px;
  }

  /* ── MAIN GRID ── */
  .main {
    padding: 28px 40px 60px;
    max-width: 100%;
  }

  .city-section { margin-bottom: 44px; }

  .city-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(200,169,110,0.12);
  }

  .city-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
  }

  .city-name.tashkent { color: var(--accent-tashkent); }
  .city-name.samarkand { color: var(--accent-samarkand); }
  .city-name.bukhara { color: var(--accent-bukhara); }
  .city-name.khiva { color: var(--accent-khiva); }

  .city-count {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.08em;
  }

  /* ── HOTEL CARDS GRID ── */
  .hotels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 16px;
  }

  .hotel-card {
    background: var(--dark2);
    border: 1px solid rgba(200,169,110,0.12);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .hotel-card:hover {
    border-color: rgba(200,169,110,0.35);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .hotel-card.hidden { display: none; }

  /* ── CARD HEADER ── */
  .card-header {
    padding: 14px 18px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid rgba(200,169,110,0.08);
  }

  .card-header:hover { background: rgba(200,169,110,0.03); }

  .hotel-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.3;
    flex: 1;
  }

  .hotel-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge {
    padding: 3px 8px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .badge-board { background: rgba(200,169,110,0.12); color: var(--gold); }
  .badge-usd { background: rgba(74,124,89,0.2); color: #7FC49A; }
  .badge-nodata { background: rgba(100,100,100,0.2); color: #888; }

  .toggle-icon {
    color: var(--text2);
    font-size: 16px;
    transition: transform 0.25s;
    margin-left: 6px;
    flex-shrink: 0;
    line-height: 1;
  }

  .hotel-card.expanded .toggle-icon { transform: rotate(180deg); }

  /* ── PRICE RANGE MINI ── */
  .price-range {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    display: block;
  }

  .price-range .from { color: var(--gold-light); font-weight: 500; }

  /* ── CARD BODY ── */
  .card-body {
    display: none;
    padding: 0 18px 16px;
  }

  .hotel-card.expanded .card-body { display: block; }

  /* ── SEASON HEADERS ── */
  .seasons-header {
    display: grid;
    gap: 1px;
    margin: 12px 0 4px;
  }

  .season-label {
    padding: 6px 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #fff;
    border-radius: 2px;
    text-align: center;
    line-height: 1.3;
  }

  /* ── PRICE TABLE ── */
  .price-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .price-table th {
    padding: 7px 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.07em;
    color: var(--text2);
    text-align: left;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(200,169,110,0.1);
  }

  .price-table th.price-col {
    text-align: right;
    font-size: 10px;
  }

  .price-table td {
    padding: 7px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  .price-table tr:last-child td { border-bottom: none; }

  .room-name-cell {
    color: var(--cream2);
    line-height: 1.3;
    font-weight: 400;
  }

  .price-cell {
    text-align: right;
    font-weight: 500;
    white-space: nowrap;
  }

  .price-amount {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
  }

  /* heat-map colors */
  .price-low { background: rgba(74,124,89,0.2); color: #7FC49A; }
  .price-mid { background: rgba(184,145,74,0.2); color: #D4A85A; }
  .price-high { background: rgba(184,130,106,0.2); color: #D4906A; }
  .price-premium { background: rgba(155,107,173,0.2); color: #C09ADE; }

  .price-na {
    color: var(--text2);
    font-size: 11px;
    padding: 2px 7px;
  }

  .price-table tr:hover td { background: rgba(200,169,110,0.04); }

  /* ── NO DATA CARD ── */
  .no-data-msg {
    padding: 16px;
    font-size: 12px;
    color: var(--text2);
    font-style: italic;
  }

  /* ── SEASON COLORS ── */
  .sc0 { background: rgba(74,124,89,0.7); }
  .sc1 { background: rgba(184,145,74,0.7); }
  .sc2 { background: rgba(106,139,173,0.7); }
  .sc3 { background: rgba(155,107,173,0.7); }

  /* ── CITY ACCENT BORDER ── */
  .hotel-card[data-city="Ташкент"] { border-left: 2px solid rgba(200,169,110,0.4); }
  .hotel-card[data-city="Самарканд"] { border-left: 2px solid rgba(123,167,184,0.4); }
  .hotel-card[data-city="Бухара"] { border-left: 2px solid rgba(184,130,106,0.4); }
  .hotel-card[data-city="Хива"] { border-left: 2px solid rgba(139,168,112,0.4); }

  /* ── ADDRESS ── */
  .hotel-address {
    font-size: 11px;
    color: var(--text2);
    margin-top: 8px;
    line-height: 1.4;
    padding: 8px 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 2px;
  }

  /* ── RESULTS COUNT ── */
  .results-count {
    font-size: 12px;
    color: var(--text2);
    padding: 10px 40px 0;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark2); }
  ::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.3); border-radius: 3px; }

  @media (max-width: 768px) {
    .header { padding: 16px 20px; }
    .header-stats { gap: 16px; }
    .filters-bar, .legend-bar, .main { padding-left: 16px; padding-right: 16px; }
    .hotels-grid { grid-template-columns: 1fr; }
    .search-input { width: 140px; }
  }
</style>
</head>

  <div class="legend-item"><div class="legend-dot sc2"></div> Сезон 3</div>

</div>

function getPriceClass(v) {
  if (v < 120) return 'price-low';
  if (v < 250) return 'price-mid';
  if (v < 500) return 'price-high';
  return 'price-premium';
}

function getMinPrice(hotel) {
  let min = Infinity;
  for (const r of hotel.rooms) {
    for (const p of Object.values(r.prices)) {
      if (p && p < min) min = p;
    }
  }
  return min === Infinity ? null : min;
}

function getMaxPrice(hotel) {
  let max = 0;
  for (const r of hotel.rooms) {
    for (const p of Object.values(r.prices)) {
      if (p && p > max) max = p;
    }
  }
  return max === 0 ? null : max;
}

function truncateLabel(s, max=38) {
  const parts = s.split(/\s+/);
  // Take first date range only
  const first = parts.slice(0, 3).join(' ');
  return first.length > max ? first.substring(0, max) + '…' : first;
}

function buildCard(hotel, idx) {
  const minP = getMinPrice(hotel);
  const maxP = getMaxPrice(hotel);
  const hasData = hotel.rooms.length > 0;

  let seasonsHTML = '';
  if (hotel.seasons.length > 0) {
    const colGrid = `repeat(${hotel.seasons.length}, 1fr)`;
    seasonsHTML = `<div class="seasons-header" style="grid-template-columns: 180px ${colGrid}; margin-top:12px; margin-bottom:4px;">
      <div></div>
      ${hotel.seasons.map((s,i) => `<div class="season-label sc${i}" title="${s}">Сезон ${i+1}<br><span style="font-size:9px;font-weight:300;opacity:0.85">${truncateLabel(s)}</span></div>`).join('')}
    </div>`;
  }

  let tableHTML = '';
  if (hasData) {
    const seasonKeys = hotel.seasons;
    const colGrid = seasonKeys.length > 0 ? `repeat(${seasonKeys.length}, 1fr)` : '1fr';
    tableHTML = `<table class="price-table">
      <colgroup>
        <col style="width:180px">
        ${seasonKeys.map(() => '<col>').join('')}
      </colgroup>
      <tbody>
        ${hotel.rooms.map(room => {
          const pkeys = Object.keys(room.prices);
          return `<tr>
            <td class="room-name-cell">${room.name}</td>
            ${seasonKeys.length > 0
              ? seasonKeys.map(sk => {
                  // Find matching price key (exact or best match)
                  const val = room.prices[sk];
                  if (val !== undefined && val !== null) {
                    return `<td class="price-cell"><span class="price-amount ${getPriceClass(val)}">$${val}</span></td>`;
                  }
                  // Try partial match
                  const matchKey = pkeys.find(k => k.trim() === sk.trim());
                  if (matchKey) {
                    const v = room.prices[matchKey];
                    return `<td class="price-cell"><span class="price-amount ${getPriceClass(v)}">$${v}</span></td>`;
                  }
                  return `<td class="price-cell"><span class="price-na">—</span></td>`;
                }).join('')
              : `<td class="price-cell"><span class="price-amount ${getPriceClass(Object.values(room.prices)[0])}">$${Object.values(room.prices)[0]}</span></td>`
            }
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  } else {
    tableHTML = `<div class="no-data-msg">Данные по ценам не загружены</div>`;
  }

  const priceRangeHTML = hasData && minP
    ? `<span class="price-range">от <span class="from">$${minP}</span> до $${maxP} / ночь · BB</span>`
    : `<span class="price-range" style="color:#666">данные уточняются</span>`;

  return `<div class="hotel-card" data-city="${hotel.city}" id="card-${idx}" onclick="toggleCard(${idx})">
    <div class="card-header">
      <div style="flex:1">
        <div class="hotel-name">${hotel.full_name || hotel.name}</div>
        ${priceRangeHTML}
      </div>
      <div class="hotel-meta">
        ${hotel.board ? `<span class="badge badge-board">${hotel.board}</span>` : ''}
        <span class="badge badge-usd">USD</span>
        ${!hasData ? `<span class="badge badge-nodata">N/A</span>` : ''}
        <span class="toggle-icon">▾</span>
      </div>
    </div>
    <div class="card-body">
      <div class="hotel-address">📍 ${hotel.address}</div>
      ${seasonsHTML}
      ${tableHTML}
    </div>
  </div>`;
}

function renderCities(filter = 'all', search = '') {
  const cities = ['Ташкент', 'Самарканд', 'Бухара', 'Хива'];
  const cityClass = {'Ташкент':'tashkent','Самарканд':'samarkand','Бухара':'bukhara','Хива':'khiva'};
  const container = document.getElementById('main-container');
  let html = '';
  let totalVisible = 0;

  for (const city of cities) {
    if (filter !== 'all' && filter !== city) continue;
    const cityHotels = HOTELS.map((h,i)=>({h,i})).filter(({h}) => h.city === city);
    if (cityHotels.length === 0) continue;

    const filtered = search
      ? cityHotels.filter(({h}) => h.name.toLowerCase().includes(search.toLowerCase()) || (h.full_name||'').toLowerCase().includes(search.toLowerCase()))
      : cityHotels;

    if (filtered.length === 0) continue;
    totalVisible += filtered.length;

    html += `<div class="city-section" data-city-section="${city}">
      <div class="city-header">
        <span class="city-name ${cityClass[city]}">${city}</span>
        <span class="city-count">${filtered.length} ${filtered.length===1?'отель':'отелей'}</span>
      </div>
      <div class="hotels-grid">
        ${filtered.map(({h,i}) => buildCard(h, i)).join('')}
      </div>
    </div>`;
  }

  container.innerHTML = html || `<div style="padding:40px;text-align:center;color:#666">Ничего не найдено</div>`;
  document.getElementById('visible-count').textContent = totalVisible;
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  if (card) card.classList.toggle('expanded');
}

let activeFilter = 'all';
let activeSearch = '';

function filterCity(btn, city) {
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = city;
  renderCities(activeFilter, activeSearch);
}

function searchHotels(q) {
  activeSearch = q;
  renderCities(activeFilter, activeSearch);
}

function expandAll() {
  document.querySelectorAll('.hotel-card').forEach(c => c.classList.add('expanded'));
}

function collapseAll() {
  document.querySelectorAll('.hotel-card').forEach(c => c.classList.remove('expanded'));
}

// Init
renderCities();
</script>
